<!-- Blank-canvas template: by design this template omits the header and footer
     template parts so a page can use the full browser canvas (landing pages,
     coming-soon screens, bespoke layouts built entirely in the editor). The
     <main id="main-content"> landmark and the editor-fillable h1 below are kept
     so the skip-link target and WCAG 2.1 1.3.1 heading order survive the missing
     chrome. To restore site navigation on a given page, use the default page
     template instead. -->
<!-- wp:group {"tagName":"main","id":"main-content","layout":{"type":"default"}} -->
<main id="main-content" class="wp-block-group">

	<!-- Page heading (required per WCAG 2.1 1.3.1). Empty by design; add a title
	     in the Site Editor. Do not delete this block. -->
	<!-- wp:heading {"level":1} -->
	<h1></h1>
	<!-- /wp:heading -->
	<!-- wp:post-content {"layout":{"type":"default"}} /-->
</main>
<!-- /wp:group -->
